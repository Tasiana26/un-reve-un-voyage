<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Rêve, Un Voyage</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .hero-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Arrière-plan : Carte complète */
        .map-background {
            position: absolute;
            width: 90%;
            height: 90%;
            object-fit: contain;
            opacity: 0.85;
            z-index: 1;
        }

        /* Élément central : Avion plus gros */
        .airplane-icon {
            position: relative;
            width: 120px; /* Taille augmentée */
            height: 120px;
            z-index: 2;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.15));
            animation: float 4s ease-in-out infinite;
        }

        /* Animation de flottaison pour l'avion */
        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-15px) rotate(3deg);
            }
            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <!-- SVG de la carte de France (vue entière) -->
        <svg class="map-background" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
            <!-- Contour simplifié de la France métropolitaine -->
            <path d="M250,50 L380,70 L480,150 L520,280 L480,420 L400,500 L300,550 L180,530 L120,420 L80,300 L110,180 L180,100 Z" 
                  fill="#e2e8f0" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="5,5"/>
            
            <!-- Quelques points de repère / villes majeurs -->
            <circle cx="280" cy="140" r="6" fill="#94a3b8" /> <!-- Paris -->
            <circle cx="450" cy="450" r="5" fill="#94a3b8" /> <!-- Marseille -->
            <circle cx="150" cy="400" r="5" fill="#94a3b8" /> <!-- Bordeaux -->
            <circle cx="460" cy="220" r="5" fill="#94a3b8" /> <!-- Lyon -->
            <circle cx="160" cy="180" r="5" fill="#94a3b8" /> <!-- Nantes -->
        </svg>

        <!-- SVG de l'avion agrandi -->
        <svg class="airplane-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 16V14L13 9V3.5C13 2.67 12.33 2 11.5 2C10.67 2 10 2.67 10 3.5V9L2 14V16L10 13.5V19L8 20.5V22L11.5 21L15 22V20.5L13 19V13.5L21 16Z" 
                  fill="#3b82f6"/>
        </svg>
    </div>

</body>
</html>
