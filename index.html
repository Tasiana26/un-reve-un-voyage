<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Un rêve un voyage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', serif; }
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    .hero img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }
    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.5) 100%);
    }
    .content {
      position: absolute;
      bottom: 120px;
      left: 60px;
      color: white;
      z-index: 2;
    }
    .content .tag {
      display: inline-block;
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 50px;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(255,255,255,0.1);
      margin-bottom: 20px;
    }
    .content h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 600;
      line-height: 1.1;
      margin-bottom: 15px;
      max-width: 700px;
    }
    .content p {
      font-size: 1rem;
      opacity: 0.9;
      max-width: 500px;
      margin-bottom: 25px;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
      margin-right: 10px;
    }
    .btn-primary {
      background: #7d5f3b;
      color: white;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <section class="hero">
    <img src="hero.jpg.jpg" alt="Un rêve un voyage">
    <div class="overlay"></div>
    <div class="content">
      <div class="tag">Travel planner sur mesure</div>
      <h1>Entre le rêve que l'on vise et le voyage que l'on imagine, il n'y a que vous…</h1>
      <p>Je crée pour vous des itinéraires inspirants, pratiques et personnalisés.</p>
      <a href="#" class="btn btn-primary">Découvrir les offres</a>
      <a href="#" class="btn btn-secondary">Voir le détail</a>
    </div>
  </section>
</body>
</html>
